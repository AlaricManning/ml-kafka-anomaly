name: CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install torch numpy confluent-kafka pytest

      - name: Train model
        working-directory: model
        run: python train.py

      - name: Run tests
        run: pytest tests/ -v
